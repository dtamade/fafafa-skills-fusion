name: CI Contract Gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  contract-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release fusion-bridge for contract gates
        run: |
          cd rust
          cargo build --release -p fusion-cli --bin fusion-bridge

      - name: Machine mode smoke gate
        run: bash scripts/ci-machine-mode-smoke.sh

      - name: Upload machine JSON artifacts
        uses: actions/upload-artifact@v4
        with:
          name: machine-smoke-json
          path: |
            /tmp/release-audit-dry-run.json
            /tmp/runner-suites.json
            /tmp/runner-contract.json

      - name: Shell syntax gate
        run: bash -n scripts/*.sh

      - name: Release smoke gate
        run: bash scripts/ci-cross-platform-smoke.sh

      - name: Rust clippy gate
        run: |
          cd rust
          cargo clippy --release --workspace --all-targets -- -D warnings

      - name: Rust tests gate
        run: |
          cd rust
          cargo test --release

      - name: Rust fmt gate
        run: |
          cd rust
          cargo fmt --all -- --check

  cross-platform-smoke-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Shell syntax smoke
        run: bash -n scripts/*.sh

      - name: Build release fusion-bridge for shell smoke
        run: |
          cd rust
          cargo build --release -p fusion-cli --bin fusion-bridge

      - name: Cross-platform shell smoke
        run: bash scripts/ci-cross-platform-smoke.sh --artifacts-dir /tmp/cross-platform-smoke-macos --platform-label macos

      - name: Validate cross-platform smoke summary
        if: always()
        run: bash scripts/ci-cross-platform-json-smoke.sh /tmp/cross-platform-smoke-macos/cross-platform-smoke-summary.json

      - name: Rust release smoke
        run: |
          cd rust
          cargo test --release -p fusion-cli --test cli_smoke

      - name: Upload cross-platform smoke summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-platform-smoke-macos-json
          path: /tmp/cross-platform-smoke-macos/cross-platform-smoke-summary.json

  cross-platform-smoke-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Shell syntax smoke
        shell: bash
        run: bash -n scripts/*.sh

      - name: Build release fusion-bridge for shell smoke
        shell: bash
        run: |
          cd rust
          cargo build --release -p fusion-cli --bin fusion-bridge

      - name: Cross-platform shell smoke
        shell: bash
        run: bash scripts/ci-cross-platform-smoke.sh --artifacts-dir /tmp/cross-platform-smoke-windows --platform-label windows-git-bash

      - name: Validate cross-platform smoke summary
        if: always()
        shell: bash
        run: bash scripts/ci-cross-platform-json-smoke.sh /tmp/cross-platform-smoke-windows/cross-platform-smoke-summary.json

      - name: Rust release smoke
        shell: bash
        run: |
          cd rust
          cargo test --release -p fusion-cli --test cli_smoke

      - name: Upload cross-platform smoke summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-platform-smoke-windows-json
          path: /tmp/cross-platform-smoke-windows/cross-platform-smoke-summary.json
