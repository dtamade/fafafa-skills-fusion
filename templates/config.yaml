# Fusion Configuration

# 后端配置
backends:
  primary: codex
  fallback: claude

# 后端路由策略（推荐：Codex 规划/审查，Claude 执行写码）
backend_routing:
  phase_routing:
    UNDERSTAND: codex
    INITIALIZE: codex
    ANALYZE: codex
    DECOMPOSE: codex
    EXECUTE: claude
    VERIFY: codex
    REVIEW: codex
    COMMIT: claude
    DELIVER: claude
  task_type_routing:
    implementation: claude
    verification: claude
    design: codex
    research: codex
    documentation: claude
    configuration: claude

# Agent Spine 配置（Stage 1）
agents:
  enabled: false
  mode: single_orchestrator   # default; use role_handoff for planner -> coder -> reviewer baton passing
  review_policy: high_risk    # high_risk | always | never
  explain_level: compact      # off | compact | verbose on current status surfaces
# Task review gate state lives in `.fusion/task_plan.md`:
# Review-Status: none | pending | approved | changes_requested

# 执行配置
execution:
  parallel: 2              # 最大并行任务数
  timeout: 7200000         # 2 小时 (毫秒)
  batch_timeout: 1800      # 每批次超时 (秒)

# 并行配置
parallel:
  enabled: true
  conflict_check: true     # 检查文件冲突
  fail_fast: false         # 一个失败是否停止所有

# Runtime 配置
runtime:
  enabled: true
  compat_mode: true        # Keep Shell fallback available when bridge is skipped
  engine: "rust"           # rust primary; single-engine runtime
  version: "2.6.3"

# Understand 阶段策略
understand:
  pass_threshold: 7         # 评分阈值 (0-10)
  require_confirmation: false  # true 时低分阻塞，等待澄清
  max_questions: 2


# TDD 配置
tdd:
  enabled: true
  test_command: null       # 自动检测: npm test, cargo test, go test 等
  coverage_threshold: 80   # 覆盖率阈值 (%)

# Git 配置
git:
  enabled: true
  branch_prefix: "fusion/"
  auto_commit: true
  commit_style: "conventional"  # conventional, simple

# 打扰级别
interaction:
  confirm_level: "never"   # never, phase, task
  report_progress: true    # 写入 progress.md

# 3-Strike 配置
recovery:
  max_strikes: 3
  auto_fallback: true      # 自动降级到 Claude

# LoopGuardian 配置 (防死循环)
loop_guardian:
  enabled: true
  max_iterations: 50       # 总迭代上限
  max_no_progress: 6       # 无进展轮数上限
  max_same_action: 3       # 同动作重复上限 → ESCALATE
  max_same_error: 3        # 同错误重复上限 → ESCALATE
  max_state_visits: 8      # 单状态访问上限
  max_wall_time_ms: 7200000  # 最大执行时间 (2小时)
  backoff_threshold: 3     # 进入 BACKOFF 的无进展轮数

# Safe Backlog 配置（长周期自治托底）
# 默认使用「平衡档（Recommended）」：
# - 兼顾防停摆与低打扰
# - 适用于大多数长期自治工作流
safe_backlog:
  enabled: true
  trigger_no_progress_rounds: 3   # Recommended (Balance)
  inject_on_task_exhausted: true
  max_tasks_per_run: 2            # Recommended (Balance)
  allowed_categories: "quality,documentation,optimization"
  diversity_rotation: true
  novelty_window: 12              # Recommended (Balance)
  backoff_enabled: true
  backoff_base_rounds: 1          # Recommended (Balance)
  backoff_max_rounds: 32          # Recommended (Balance)
  backoff_jitter: 0.2             # Recommended (Balance)
  backoff_force_probe_rounds: 20  # Recommended (Balance)
  max_files_touched: 4
  max_lines_changed: 200

# 虚拟监督官配置（默认关闭，增补式 advisory）
supervisor:
  enabled: false
  mode: "advisory"                # advisory (当前仅支持)
  persona: "Guardian"
  trigger_no_progress_rounds: 2
  cadence_rounds: 2
  force_emit_rounds: 12
  max_suggestions: 2

# v2.5.0 调度器配置
scheduler:
  enabled: true            # 默认开启，可按需关闭回退串行
  max_parallel: 2          # 最大并行任务数
  fail_fast: false         # 一个失败是否停止全部

# v2.5.0 预算配置
budget:
  global_token_limit: 100000     # 全局 token 上限
  global_latency_limit_ms: 7200000  # 全局时延上限 (2小时)
  warning_threshold: 0.8         # 80% 时预警
  hard_limit_action: "serial"    # serial | pause | skip
